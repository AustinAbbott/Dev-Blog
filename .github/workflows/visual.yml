name: Visual

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  visual:
    name: Visual snapshot tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build site
        run: npm run build

      # One-shot: produce Linux baselines as an artifact so we can commit them.
      # Remove after baselines are committed and switch back to npm run test:visual.
      - name: Generate Linux snapshots
        run: npx playwright test --update-snapshots

      - name: Upload Linux snapshots
        uses: actions/upload-artifact@v4
        with:
          name: linux-snapshots
          path: tests/visual.spec.ts-snapshots/
